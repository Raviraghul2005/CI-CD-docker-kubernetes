apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-test-app
  template:
    metadata:
      labels:
        app: java-test-app
    spec:
      containers:
      - name: java-test-app
        image: raviraghul/test-java-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-test-service
spec:
  type: NodePort
  selector:
    app: java-test-app
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30007
